############ LED EFFECTS ##############

#Bed idle with Temp
[led_effect bed_effects]
leds:
    neopixel:caselight
autostart:                          true
frame_rate:                         24
heater:                             heater_bed
layers:
    heater  50 0 add    (1,1,0),(1,0,0)
    static  0  0 top    (1,0,0)

#Progress Bar

[led_effect progress_bar]
leds:
    neopixel:caselight
autostart:                          true
frame_rate:                         24
layers:
    progress  -1  0 add         ( 0, 0,   1),( 0, 0.1, 0.6)
    static     0  0 top         ( 0, 0, 0.1)

#breathe effect on boot up
[led_effect panel_idle]
autostart:              true
frame_rate:             24
leds:
    neopixel:caselight
layers:
    breathing  10 1 top (.5,.5,1)
